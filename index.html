<!DOCTYPE html>
<html>
<head>
  <title>Caza Estrellas</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>
</head>
<body onload="iniciar()">
  <div class="contenedor">
    
    <header class="header">
      <h1>🍋 Atrapar Limones</h1>
      <p class="frase">"Si del cielo te caen limones, haz limonada"</p>
      <h2 class="autor">Autor: Jazmin Cacuango</h2>
    </header>

    <section class="juego">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </section>

    <section class="panel">
      <div class="card">
        <p>Puntaje</p>
        <span id="txtPuntaje">0</span>
      </div>
      <div class="card">
        <p>Vidas</p>
        <span id="txtVidas">2</span>
      </div>
    </section>

    <div class="botones">
  <button class="btn btn-izq" onclick="moverIzquierda();">
    <span class="icono">⬅</span> Izquierda
  </button>

  <button class="btn btn-der" onclick="moverDerecha();">
    Derecha <span class="icono">➡</span>
  </button>

  <button class="btn btn-reiniciar" onclick="reiniciar();">
    <span class="icono">🔄</span> Reiniciar
  </button>
</div>

  </div>
  <script src="limones.js"></script>
</body>
</html>
